name: Build DayZ Loader
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Install DX9
      run: nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory pkg
    - name: Build
      run: |
        $dx_inc = "$(Get-Location)\pkg\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\include"
        $dx_lib = "$(Get-Location)\pkg\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\release\lib\x86"
        msbuild DayZLoader.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:IncludePath="$dx_inc;$(IncludePath)" /p:LibraryPath="$dx_lib;$(LibraryPath)"
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader
        path: "**/Release/*.exe"
