name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Loader
      shell: powershell
      run: |
        # 1. Arruma os arquivos para ficarem na raiz
        Get-ChildItem -Recurse -Include *.cpp, *.h, *.vcxproj, *.filters | Copy-Item -Destination "." -Force
        
        # 2. Compila usando o SDK do Windows 10 (que ja tem o DirectX 9 moderno incluso)
        msbuild DayZLoader.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /p:IncludePath="$(IncludePath)" /p:LibraryPath="$(LibraryPath)"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x86/*.exe"
