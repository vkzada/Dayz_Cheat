name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install DirectX Dependencies
      shell: powershell
      run: |
        nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory packages

    - name: Fix Structure and Build
      shell: powershell
      run: |
        # 1. Cria a estrutura de pastas que o projeto espera
        mkdir -p examples/example_win32_directx9 -Force
        
        # 2. Move os arquivos para os lugares corretos
        # Move arquivos do loader para a pasta do projeto
        Get-ChildItem -Filter "main.cpp", "options.*" -Recurse | ForEach-Object { Move-Item $_.FullName "examples/example_win32_directx9/" -Force }
        
        # Move arquivos do ImGui para a raiz (onde o projeto espera ../../)
        Get-ChildItem -Filter "imgui*", "imstb*" -Recurse | ForEach-Object { Move-Item $_.FullName "./" -Force }
        
        # 3. Localiza o arquivo de projeto
        $proj = Get-ChildItem -Recurse -Filter "DayZLoader.vcxproj" | Select-Object -First 1
        if (-not $proj) { Write-Error "Projeto nao encontrado!"; exit 1 }

        # 4. Caminhos das bibliotecas DirectX
        $dx_inc = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\include"
        $dx_lib = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\release\lib\x86"
        
        # 5. Compila
        msbuild $proj.FullName /p:Configuration=Release /p:Platform=Win32 /p:IncludePath="$dx_inc;$(IncludePath)" /p:LibraryPath="$dx_lib;$(LibraryPath)"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x86/*.exe"
