name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Loader
      run: |
        # Este comando procura o arquivo .vcxproj e compila ele onde quer que esteja
        $proj = Get-ChildItem -Recurse -Filter "*.vcxproj" | Select-Object -First 1
        if ($proj) {
          msbuild $proj.FullName /p:Configuration=Release /p:Platform=x64
        } else {
          Write-Error "Arquivo .vcxproj nao encontrado no repositorio!"
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x64/*.exe"
