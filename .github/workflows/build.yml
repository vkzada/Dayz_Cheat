name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install DirectX Dependencies
      shell: powershell
      run: |
        nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory packages

    - name: Organize Files and Build
      shell: powershell
      run: |
        # 1. Garante que os arquivos do ImGui estao onde o projeto espera (raiz)
        # O projeto espera que imgui.cpp esteja em ../../ relativo ao vcxproj
        # Como o vcxproj esta em examples/example_win32_directx9/, a raiz e o lugar certo.
        
        # 2. Procura o arquivo de projeto
        $proj = Get-ChildItem -Recurse -Filter "DayZLoader.vcxproj" | Select-Object -First 1
        if (-not $proj) { Write-Error "Projeto nao encontrado!"; exit 1 }

        # 3. Caminhos das bibliotecas DirectX
        $dx_inc = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\include"
        $dx_lib = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\release\lib\x86"
        
        # 4. Compila forçando os caminhos e ignorando erros de caminhos relativos
        msbuild $proj.FullName /p:Configuration=Release /p:Platform=Win32 /p:IncludePath="$dx_inc;$(IncludePath);$(ProjectDir);$(ProjectDir)..\;$(ProjectDir)..\..\" /p:LibraryPath="$dx_lib;$(LibraryPath)"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x86/*.exe"
