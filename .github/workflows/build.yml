name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install DirectX Dependencies
      shell: powershell
      run: |
        # Instala o pacote que contem as bibliotecas estaticas (.lib)
        nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory packages

    - name: Fix Project and Build
      shell: powershell
      run: |
        # 1. Organiza os arquivos na raiz
        Get-ChildItem -Recurse -Include *.cpp, *.h, *.hpp, *.vcxproj, *.filters | Copy-Item -Destination "." -Force
        
        # 2. Limpa caminhos no arquivo de projeto
        (Get-Content DayZLoader.vcxproj) -replace 'Include="..\\..\\', 'Include="' -replace 'Include="..\\', 'Include="' | Set-Content DayZLoader.vcxproj
        
        # 3. Caminhos das bibliotecas (Desta vez com caminhos forçados)
        $dx_inc = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\include"
        $dx_lib = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\release\lib\x86"
        
        # 4. Compila passando as bibliotecas DIRETAMENTE no comando
        # Isso força o compilador a usar os arquivos que baixamos
        msbuild DayZLoader.vcxproj /p:Configuration=Release /p:Platform=Win32 `
          /p:IncludePath="$dx_inc;$(IncludePath)" `
          /p:LibraryPath="$dx_lib;$(LibraryPath)" `
          /p:AdditionalDependencies="$dx_lib\d3dx9.lib;d3d9.lib;wininet.lib;shell32.lib;user32.lib;gdi32.lib;advapi32.lib;ole32.lib" `
          /p:WindowsTargetPlatformVersion=10.0 `
          /p:LinkIncremental=false
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x86/*.exe"
