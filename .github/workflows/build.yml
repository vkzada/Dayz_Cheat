name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Loader
      shell: powershell
      run: |
        # Procura o projeto
        $proj = Get-ChildItem -Recurse -Filter "*.vcxproj" | Select-Object -First 1
        if (-not $proj) { Write-Error "Projeto nao encontrado!"; exit 1 }

        # Remove dependencias de bibliotecas externas antigas e compila usando bibliotecas padrão
        # O MSBuild no GitHub já tem o DirectX moderno, vamos forçar o uso dele
        msbuild $proj.FullName /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x64/*.exe"
