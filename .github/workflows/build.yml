name: Build DayZ Loader

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install DirectX Dependencies
      shell: powershell
      run: |
        # Instala o pacote completo que contem d3dx9.h
        nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory packages
        # Instala tambem o core do DirectX para garantir d3d9.h
        nuget install Microsoft.DXSDK.D3D -Version 9.29.952.7 -OutputDirectory packages

    - name: Fix Structure and Build
      shell: powershell
      run: |
        # 1. Organiza os arquivos
        mkdir -p examples/example_win32_directx9 -Force
        Get-ChildItem -Filter "main.cpp", "options.*" -Recurse | ForEach-Object { Move-Item $_.FullName "examples/example_win32_directx9/" -Force }
        Get-ChildItem -Filter "imgui*", "imstb*", "imconfig.h" -Recurse | ForEach-Object { Move-Item $_.FullName "./" -Force }
        
        # 2. Localiza o arquivo de projeto
        $proj = Get-ChildItem -Recurse -Filter "DayZLoader.vcxproj" | Select-Object -First 1
        if (-not $proj) { Write-Error "Projeto nao encontrado!"; exit 1 }

        # 3. Caminhos das bibliotecas DirectX (Pega de ambos os pacotes)
        $dx_inc1 = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\include"
        $dx_inc2 = "$(Get-Location)\packages\Microsoft.DXSDK.D3D.9.29.952.7\build\native\include"
        $dx_lib1 = "$(Get-Location)\packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\release\lib\x86"
        $dx_lib2 = "$(Get-Location)\packages\Microsoft.DXSDK.D3D.9.29.952.7\build\native\release\lib\x86"
        
        # 4. Compila incluindo ambos os caminhos
        msbuild $proj.FullName /p:Configuration=Release /p:Platform=Win32 /p:IncludePath="$dx_inc1;$dx_inc2;$(IncludePath)" /p:LibraryPath="$dx_lib1;$dx_lib2;$(LibraryPath)"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DayZ-Loader-Exe
        path: "**/bin/Release_x86/*.exe"
